<!DOCTYPE html>
<html>
<head>
    <title>Product Browser</title>

    <style>
        body {
            font-family: Arial;
            margin: 30px;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        .controls {
            margin-bottom: 20px;
            text-align: center;
        }

        select, button {
            padding: 10px;
            margin: 5px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<h1>Product Browser</h1>

<div class="controls">
    <select id="category">
        <option value="">All Categories</option>
        <option value="electronics">Electronics</option>
        <option value="books">Books</option>
        <option value="fashion">Fashion</option>
        <option value="sports">Sports</option>
        <option value="home">Home</option>
    </select>

    <button onclick="loadProducts(true)">Filter</button>
    <button onclick="loadProducts(false)">Next Page</button>
</div>

<div id="products" class="products"></div>

{% load static %}
<script src="{% static 'js/products.js' %}"></script>

</body>
</html>
